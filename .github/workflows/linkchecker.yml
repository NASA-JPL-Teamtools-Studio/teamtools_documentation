name: Daily Link Health Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    # Note: We don't need 'permissions:' here because the App Token 
    # carries its own permissions defined in the App settings.
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Token from GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.LINK_CHECKER_APP_ID }}
          private-key: ${{ secrets.LINK_CHECKER_PRIVATE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install LinkChecker
        run: pip install linkchecker

      - name: Run Link Scan
        run: |
          linkchecker https://nasa-jpl-teamtools-studio.github.io/teamtools_documentation/ --no-status --check-extern > full_report.txt || echo "Links broken"

      - name: Filter Broken Links
        if: always()
        run: |
          grep -E "404|Error|Connection" full_report.txt > broken_links.txt || echo "Clean"

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broken-links-report
          path: broken_links.txt

      - name: Create Issue via App
        env:
          # We use the token from the App, not the GITHUB_TOKEN
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          if [ -s broken_links.txt ]; then
            gh issue create \
              --title "⚠️ Broken Links Detected: $(date +'%Y-%m-%d')" \
              --assignee "mrmuszynski" \
              --body "## Daily Health Check Failed
              The link crawler found broken links. 
              
              **How to view:**
              1. Download the 'broken-links-report' from the Artifacts section of this run.
              2. See the [Full Run Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            exit 1
          fi