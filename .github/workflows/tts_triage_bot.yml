name: Auto Assign Triage Team

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage (manual test)'
        required: false

jobs:
  assign-triage:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'NASA-JPL-Teamtools-Studio'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Triage Token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.TTS_TRIAGE_BOT_ID }}
          private-key: ${{ secrets.TTS_TRIAGE_BOT_PRIVATE_KEY }}

      - name: Notify Triage Team & Label
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          ISSUE_NUM: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          if [ -z "$ISSUE_NUM" ]; then
            echo "Error: No issue number found."
            exit 1
          fi

          # 1. Add the triage label so it appears in the team's queue
          gh issue edit "$ISSUE_NUM" --add-label "triage"

          # 2. Post the GSE Checklist and @mention the team
          # This triggers the notification for everyone in the Triage 'seat'
          gh issue comment "$ISSUE_NUM" --body "
          ### 🚨 Ground System Alert: Triage Required
          **Attention:** @NASA-JPL-Teamtools-Studio/triage
          
          The **Triage Team** has been notified of this new issue.
          
          **GSE Checklist:**
          - [ ] Assess whether ticket belongs in this repo
          - [ ] Assign criticality
          - [ ] Assign developer 
          = [ ] Remove triage label
          
          *This issue was processed by the TTS Triage Bot.*"