name: Publish docs to gh-pages
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history, which mkdocs sometimes uses for 'last updated' dates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install local package
        run: |
          python -m pip install --upgrade pip
          # This installs your lib + all dependencies in pyproject.toml
          pip install . 

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Deploy to gh-pages
        run: |
          # This command builds the site AND pushes it to the gh-pages branch
          mkdocs gh-deploy --force